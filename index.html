<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== Header ===== -->
  <header class="app-header">
    <h1>Expense Tracker</h1>
    <p class="subtitle">Track your income & expenses, all in one place</p>
  </header>

  <main class="app-container">

    <!-- ===== A. Add Transaction Form ===== -->
    <section class="card form-card">
      <h2>Add Transaction</h2>
      <form id="transactionForm">
        <div class="form-group">
          <label for="title">Title</label>
          <input type="text" id="title" placeholder="e.g. Salary, Groceries" required />
        </div>

        <div class="form-group">
          <label for="amount">Amount</label>
          <input type="number" id="amount" placeholder="0.00" min="0.01" step="0.01" required />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="type">Type</label>
            <select id="type" required>
              <option value="income">Income</option>
              <option value="expense">Expense</option>
            </select>
          </div>

          <div class="form-group">
            <label for="date">Date</label>
            <input type="date" id="date" required />
          </div>
        </div>

        <button type="submit" id="submitBtn">Add Transaction</button>
      </form>
    </section>

    <!-- ===== C. Summary Section ===== -->
    <section class="summary-grid">
      <div class="summary-card income">
        <span class="summary-label">Total Income</span>
        <span id="totalIncome" class="summary-value">₹0.00</span>
      </div>
      <div class="summary-card expense">
        <span class="summary-label">Total Expense</span>
        <span id="totalExpense" class="summary-value">₹0.00</span>
      </div>
      <div class="summary-card balance">
        <span class="summary-label">Balance</span>
        <span id="totalBalance" class="summary-value">₹0.00</span>
      </div>
    </section>

    <!-- ===== B. Transaction History Table ===== -->
    <section class="card history-card">
      <h2>Transaction History</h2>

      <p id="emptyState" class="empty-state hidden">
        No transactions yet. Add your first one above.
      </p>

      <div class="table-wrapper">
        <table id="transactionTable" class="hidden">
          <thead>
            <tr>
              <th>Title</th>
              <th>Amount</th>
              <th>Type</th>
              <th>Date</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="transactionBody">
            <!-- Rows injected by JS -->
          </tbody>
        </table>
      </div>
    </section>

  </main>

  <!-- ===== Edit Modal ===== -->
  <div id="editModal" class="modal hidden">
    <div class="modal-content">
      <h2>Edit Transaction</h2>
      <form id="editForm">
        <input type="hidden" id="editId" />

        <div class="form-group">
          <label for="editTitle">Title</label>
          <input type="text" id="editTitle" required />
        </div>

        <div class="form-group">
          <label for="editAmount">Amount</label>
          <input type="number" id="editAmount" min="0.01" step="0.01" required />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="editType">Type</label>
            <select id="editType" required>
              <option value="income">Income</option>
              <option value="expense">Expense</option>
            </select>
          </div>

          <div class="form-group">
            <label for="editDate">Date</label>
            <input type="date" id="editDate" required />
          </div>
        </div>

        <div class="modal-actions">
          <button type="button" id="cancelEditBtn" class="btn-secondary">Cancel</button>
          <button type="submit" class="btn-primary">Save Changes</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
